<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rion's Defended Bank Vault</title>
    <style>
        /* This is CSS - We are styling your victory card! */
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .atm-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 350px;
        }

        h1 {
            color: #00ffcc;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .status-badge {
            background-color: #00ffcc;
            color: #0f2027;
            padding: 5px 10px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }

        .balance-display {
            font-size: 40px;
            font-weight: bold;
            margin: 20px 0;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        button {
            background: #00ffcc;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #0f2027;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.2);
        }

        button:hover {
            background: #ffffff;
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="atm-card">
        <span class="status-badge">🎓 DEFENSE PASSED</span>
        <h1 id="user-display">Account Holder: Loading...</h1>
        
        <div id="balance-display" class="balance-display">$0</div>
        
        <div style="margin-bottom: 20px;">
            <input type="number" id="amount-input" placeholder="Enter amount ($)" 
                   style="width: 80%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.2); color: white; text-align: center; font-size: 16px; margin-bottom: 15px;">
            
            <div style="display: flex; gap: 10px;">
                <button onclick="handleDeposit()" style="background: #00ffcc;">Deposit</button>
                <button onclick="handleWithdraw()" style="background: #ff4d4d; color: white;">Withdraw</button>
            </div>
        </div>

        <div style="margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; text-align: left;">
            <h3 style="font-size: 16px; color: #a0aec0; margin-bottom: 10px;">Audit History Logs:</h3>
            <ul id="ledger-list" style="list-style: none; padding: 0; margin: 0; font-size: 14px; max-height: 150px; overflow-y: auto;">
                </ul>
        </div>
    </div>
<script>
    // 🏦 Part 1: Your Fortified Bank Database
    const bankAccount = {
        accountHolder: "Rion, Certified Graduate",
        balance: 1500,
        transactions: [] // Holding history objects: { type: "Deposit", amount: 500 }
    };

    // 🧾 Part 2: The Audit Logger (Your Hand-Typed Logic from Day 6!)
    function logTransaction(type, amount) {
        bankAccount.transactions.push({ type, amount });
        printStatementToScreen(); // Re-render the visual logs list whenever a transaction happens
    }

    // 🎭 Part 3: DOM Rendering Master
    function updateWebScreen() {
        document.getElementById("user-display").textContent = bankAccount.accountHolder;
        document.getElementById("balance-display").textContent = "$" + bankAccount.balance;
    }

    // 📜 Part 4: Building Dynamic Lists on a Webpage
    function printStatementToScreen() {
        const ledgerList = document.getElementById("ledger-list");
        
        // Clear old visual rows out of the list so we don't repeat entries!
        ledgerList.innerHTML = "";

        // Loop through the array using .forEach() and construct HTML elements inside the DOM
        bankAccount.transactions.forEach((transaction, index) => {
            const row = document.createElement("li");
            
            // Set styles conditionally based on transaction type!
            if (transaction.type === "Deposit") {
                row.style.color = "#00ffcc";
                row.textContent = `${index + 1}. 🟢 Deposit: +$${transaction.amount}`;
            } else {
                row.style.color = "#ff4d4d";
                row.textContent = `${index + 1}. 🔴 Withdrawal: -$${transaction.amount}`;
            }
            
            row.style.marginBottom = "8px";
            ledgerList.appendChild(row); // Attach the new row securely onto the visible list
        });
    }

    // 💵 Part 5: Core ATM Interactivity Engines
    function handleDeposit() {
        const inputField = document.getElementById("amount-input");
        const rawValue = inputField.value;
        const depositAmount = Number(rawValue);

        // Defensive Guards (From your Copilot session!)
        if (isNaN(depositAmount) || depositAmount <= 0) {
            alert("🚨 Transaction Denied: Please enter a valid positive numerical amount.");
            return;
        }

        bankAccount.balance += depositAmount;
        logTransaction("Deposit", depositAmount);
        
        updateWebScreen(); // Apply updates visually
        inputField.value = ""; // Zero-out the input box for the next run
    }

    function handleWithdraw() {
        const inputField = document.getElementById("amount-input");
        const withdrawAmount = Number(inputField.value);

        if (isNaN(withdrawAmount) || withdrawAmount <= 0) {
            alert("🚨 Transaction Denied: Please enter a valid positive numerical amount.");
            return;
        }

        // Insufficient funds handling
        if (withdrawAmount > bankAccount.balance) {
            alert(`🚨 Transaction Denied: Insufficient funds for a $${withdrawAmount} withdrawal.`);
            return;
        }

        bankAccount.balance -= withdrawAmount;
        logTransaction("Withdrawal", withdrawAmount);
        
        updateWebScreen();
        inputField.value = "";
    }

    // Initialization Sequence
    updateWebScreen();
</script>
</body>
</html>
