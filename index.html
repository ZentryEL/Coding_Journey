<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rion's Defended Bank Vault</title>
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

   <div class="atm-card">
        <span class="status-badge">🎓 DEFENSE PASSED</span>
        <h1 id="user-display">Account Holder: Loading...</h1>
        
        <div id="balance-display" class="balance-display">$0</div>
        
        <div class="control-panel">
            <input type="number" id="amount-input" placeholder="Enter amount ($)" class="atm-input">
            
            <div class="button-group">
                <button onclick="handleDeposit()" style="background: #00ffcc;">Deposit</button>
                <button onclick="handleWithdraw()" style="background: #ff4d4d; color: white;">Withdraw</button>
            </div>
        </div>

        <div style="margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
            <p style="font-size: 14px; color: #a0aec0; margin-bottom: 5px; text-align: left;">Live Exchange Views:</p>
            <div class="forex-group">
                <button onclick="convertCurrency('EUR')" class="btn-secondary">View € EUR</button>
                <button onclick="convertCurrency('GBP')" class="btn-secondary">View £ GBP</button>
                <button onclick="convertCurrency('PHP')" class="btn-secondary">View ₱ PHP</button>
                <button onclick="updateWebScreen()" class="btn-secondary" style="background: #ffffff;">Reset ($)</button>
            </div>
        </div>

        <div style="margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; text-align: left;">
            <h3 style="font-size: 16px; color: #a0aec0; margin-bottom: 10px;">Audit History Logs:</h3>
            <ul id="ledger-list" style="list-style: none; padding: 0; margin: 0; font-size: 14px; max-height: 150px; overflow-y: auto;">
                </ul>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
