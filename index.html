<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rion's Defended Bank Vault</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="atm-card">
        <!-- Status Header -->
        <header class="atm-header">
            <span class="status-badge">🎓 DEFENSE PASSED</span>
            <h1 id="user-display">Account Holder: Loading...</h1>
        </header>

        <!-- Balance Display Section -->
        <section class="balance-section">
            <div id="balance-display" class="balance-display">$0</div>
        </section>

        <!-- Transaction Controls Section -->
        <section class="transactions-section">
            <form id="transaction-form" class="control-panel">
                <input 
                    type="number" 
                    id="amount-input" 
                    placeholder="Enter amount ($)" 
                    class="atm-input"
                    aria-label="Transaction amount input"
                    min="0"
                    step="0.01"
                >
                
                <div class="button-group">
                    <button 
                        type="button" 
                        id="deposit-btn" 
                        class="btn-deposit"
                        aria-label="Deposit funds to account"
                    >
                        Deposit
                    </button>
                    <button 
                        type="button" 
                        id="withdraw-btn" 
                        class="btn-withdraw"
                        aria-label="Withdraw funds from account"
                    >
                        Withdraw
                    </button>
                </div>
            </form>
        </section>

        <!-- Live Exchange Views Section -->
        <section class="exchange-views-section">
            <h2 class="section-title">Live Exchange Views</h2>
            <div class="forex-group">
                <button 
                    type="button" 
                    class="btn-secondary" 
                    data-currency="EUR"
                    aria-label="View balance in Euro"
                >
                    View € EUR
                </button>
                <button 
                    type="button" 
                    class="btn-secondary" 
                    data-currency="GBP"
                    aria-label="View balance in British Pound"
                >
                    View £ GBP
                </button>
                <button 
                    type="button" 
                    class="btn-secondary" 
                    data-currency="PHP"
                    aria-label="View balance in Philippine Peso"
                >
                    View ₱ PHP
                </button>
                <button 
                    type="button" 
                    class="btn-reset"
                    aria-label="Reset to USD"
                >
                    Reset ($)
                </button>
            </div>
        </section>

        <!-- Currency Conversion Section -->
        <section class="currency-section">
            <form id="currency-form" class="currency-panel">
                <label for="currency-select">Select Target Mainframe:</label>
                <select 
                    id="currency-select"
                    aria-label="Select currency for conversion"
                >
                    <option value="PHP">Philippine Peso (PHP)</option>
                    <option value="EUR">Euro (EUR)</option>
                    <option value="GBP">British Pound (GBP)</option>
                    <option value="JPY">Japanese Yen (JPY)</option>
                </select>

                <button 
                    type="button" 
                    id="convert-btn"
                    aria-label="Execute currency conversion"
                >
                    Execute Conversion
                </button>

                <div class="display-container">
                    <p>Converted Balance: <span id="converted-balance-display">--.--</span></p>
                </div>
            </form>
        </section>

        <!-- Audit History Section -->
        <section class="audit-section">
            <h2 class="section-title">Audit History Logs</h2>
            <ul 
                id="ledger-list" 
                class="ledger-list"
                aria-label="Transaction history"
            >
            </ul>
        </section>
    </main>

    <noscript>
        <p style="padding: 20px; color: red;">
            This application requires JavaScript to be enabled. Please enable JavaScript in your browser settings.
        </p>
    </noscript>

    <script src="js/app.js" defer></script>
</body>
</html>
